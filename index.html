<script>
  let tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.body.appendChild(tag);

  // MUDANÇA AQUI: Trocado 'let' por 'var' para garantir escopo global absoluto
  var player, interval;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: 'Wl4JTfAN91Q',
      playerVars: {
        'autoplay': 1,
        'controls': 0,
        'mute': 1,
        'rel': 0,
        'modestbranding': 1,
        'showinfo': 0,
        'enablejsapi': 1,
        'fs': 0,
        'playsinline': 1
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady(event) {
    event.target.playVideo();
    updateProgress();
  }

  function updateProgress() {
    interval = setInterval(() => {
      if (player && typeof player.getDuration === 'function') {
        const duration = player.getDuration();
        const current = player.getCurrentTime();
        const percent = (current / duration) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
      }
    }, 500);
  }

  document.getElementById("unmuteBtn").addEventListener("click", () => {
    player.unMute();
    player.seekTo(0);
    player.playVideo();
    document.getElementById("audioOverlay").style.display = "none";
  });

  document.getElementById("resumeBtn").addEventListener("click", () => {
    player.playVideo();
    document.getElementById("pauseOverlay").style.display = "none";
  });

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PAUSED) {
      document.getElementById("pauseOverlay").style.display = "flex";
    } else {
      document.getElementById("pauseOverlay").style.display = "none";
    }
  }

  const blocker = document.getElementById("contextBlocker");
  blocker.addEventListener("contextmenu", function (e) {
    e.preventDefault();
  });

  blocker.addEventListener("click", function () {
    const state = player.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  });

  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
  });
</script>

<script>
    // MUDANÇA AQUI: Reduzido para 5 segundos apenas para você testar.
    // Depois que ver funcionando, volte para 60.
    const TEMPO_DESBLOQUEIO_SEGUNDOS = 5; 
    let isUnlocked = false;

    const unlockInterval = setInterval(() => {
        // MUDANÇA AQUI: Verificação extra de segurança para evitar erros da API do YouTube
        if (typeof player !== 'undefined' && typeof player.getCurrentTime === 'function') {
            const currentTime = player.getCurrentTime();
            
            if (currentTime >= TEMPO_DESBLOQUEIO_SEGUNDOS && !isUnlocked) {
                isUnlocked = true;
                const mainBtn = document.getElementById('main-btn');
                mainBtn.classList.remove('btn-locked');
                mainBtn.classList.add('btn-unlocked');
                mainBtn.innerHTML = '👉 Recuperar minhas fotos agora';
                mainBtn.removeAttribute('disabled');
                clearInterval(unlockInterval); 
            }
        }
    }, 1000);

    const mainBtn = document.getElementById('main-btn');
    const hiddenContent = document.getElementById('hidden-content');

    mainBtn.addEventListener('click', () => {
        if (isUnlocked) {
            hiddenContent.classList.add('show');
            setTimeout(() => {
                hiddenContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    });

    const slider = document.getElementById('slider');
    const imgAfter = document.getElementById('img-after');
    const sliderHandle = document.getElementById('slider-handle');
    let isDragging = false;

    function moveSlider(e) {
        const rect = slider.getBoundingClientRect();
        let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        let x = clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width)); 
        const percent = (x / rect.width) * 100;
        imgAfter.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
        sliderHandle.style.left = `${percent}%`;
    }

    slider.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    slider.addEventListener('mousemove', (e) => { if (isDragging) moveSlider(e); });

    slider.addEventListener('touchstart', (e) => { isDragging = true; moveSlider(e); }, {passive: true});
    window.addEventListener('touchend', () => isDragging = false);
    slider.addEventListener('touchmove', (e) => {
        if (isDragging) {
            if(e.cancelable) e.preventDefault(); 
            moveSlider(e);
        }
    }, {passive: false});
</script>
